<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" data-grammar="mechanism" data-mandatory-semantics="stage_bands,input_operation_output_roles,transformation_arrows,feedback_lane,state_tensor_operation_shapes,directive:encoding.color_scale,directive:edge.bidirectional" data-visual-directives="encoding.color_scale,edge.bidirectional">
<rect width="100%" height="100%" fill="#F8FAFC"/>
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.12"/></filter>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker>
<marker id="arrow-primary" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/></marker>
<marker id="arrow-forward" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/></marker>
<marker id="arrow-reverse" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#B45309"/></marker>
</defs>
<g class="mandatory-semantics" data-items="stage_bands,input_operation_output_roles,transformation_arrows,feedback_lane,state_tensor_operation_shapes,directive:encoding.color_scale,directive:edge.bidirectional"/>
<g class="visual-directives" data-items="encoding.color_scale,edge.bidirectional"/>
<text x="550.0" y="28.0" fill="#0F172A" font-size="17" text-anchor="middle" dominant-baseline="middle">神经网络反向传播示意图</text>
<g class="stage-band input-stage" data-label="输入">
<rect x="72.0" y="86.0" width="170.0" height="382.0" rx="16" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1.5"/>
<text class="stage-title" x="90.0" y="116" fill="#0F172A" font-size="13" font-weight="bold">输入</text>
</g>
<g class="stage-band operation-stage" data-label="操作 / 转换">
<rect x="312.0" y="86.0" width="476.0" height="382.0" rx="16" fill="#EDE9FE" stroke="#CBD5E1" stroke-width="1.5"/>
<text class="stage-title" x="330.0" y="116" fill="#0F172A" font-size="13" font-weight="bold">操作 / 转换</text>
</g>
<g class="stage-band output-stage" data-label="状态 / 输出">
<rect x="788.0" y="86.0" width="240.0" height="382.0" rx="16" fill="#DCFCE7" stroke="#CBD5E1" stroke-width="1.5"/>
<text class="stage-title" x="806.0" y="116" fill="#0F172A" font-size="13" font-weight="bold">状态 / 输出</text>
</g>
<g class="input-node tensor-operation-shape input-role mechanism-node" data-label="前向传播从左到右经过输入层">
<rect x="98.0" y="148.0" width="118.0" height="52.0" rx="26.0" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
<text x="157.0" y="166.2" fill="#0F172A" font-size="12" text-anchor="middle" dominant-baseline="middle">前向传播从左到</text>
<text x="157.0" y="181.8" fill="#0F172A" font-size="12" text-anchor="middle" dominant-baseline="middle">右经过输入层</text>
</g>
<g class="operation-node tensor-operation-shape operation-role mechanism-node" data-label="神经网络反向传播示意图">
<rect x="350.0" y="148.0" width="130.0" height="60.0" rx="6" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="415.0" y="170.8" fill="#0F172A" font-size="11" text-anchor="middle" dominant-baseline="middle">神经网络反向传播</text>
<text x="415.0" y="185.2" fill="#0F172A" font-size="11" text-anchor="middle" dominant-baseline="middle">示意图</text>
</g>
<g class="operation-node tensor-operation-shape operation-role mechanism-node" data-label="隐藏层">
<rect x="492.0" y="148.0" width="130.0" height="60.0" rx="6" fill="#CCFBF1" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="557.0" y="178.0" fill="#0F172A" font-size="11" text-anchor="middle" dominant-baseline="middle">隐藏层</text>
</g>
<g class="operation-node tensor-operation-shape operation-role mechanism-node" data-label="反向传播从右到左用链式法则更新各层梯度">
<rect x="634.0" y="148.0" width="130.0" height="60.0" rx="6" fill="#DCFCE7" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="699.0" y="163.7" fill="#0F172A" font-size="11" text-anchor="middle" dominant-baseline="middle">反向传播从右到左</text>
<text x="699.0" y="178.0" fill="#0F172A" font-size="11" text-anchor="middle" dominant-baseline="middle">用链式法则更新各</text>
<text x="699.0" y="192.3" fill="#0F172A" font-size="11" text-anchor="middle" dominant-baseline="middle">层梯度</text>
</g>
<g class="operation-node tensor-operation-shape operation-role mechanism-node" data-label="用不同颜色箭头区分前向和反向">
<rect x="350.0" y="236.0" width="130.0" height="60.0" rx="6" fill="#EDE9FE" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="415.0" y="258.9" fill="#0F172A" font-size="11" text-anchor="middle" dominant-baseline="middle">用不同颜色箭头区</text>
<text x="415.0" y="273.2" fill="#0F172A" font-size="11" text-anchor="middle" dominant-baseline="middle">分前向和反向</text>
</g>
<g class="output-state-node tensor-operation-shape output-role mechanism-node" data-label="输出层计算损失">
<rect x="824.0" y="148.0" width="142.0" height="60.0" rx="6" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="895.0" y="178.0" fill="#0F172A" font-size="11" text-anchor="middle" dominant-baseline="middle">输出层计算损失</text>
</g>
<g class="transformation-arrow mechanism-edge">
<path class="transformation-arrow mechanism-edge-path" d="M 415.0 178.0 L 286.0 178.0 L 286.0 178.0 L 157.0 178.0" fill="none" stroke="#2563EB" stroke-width="1.7" marker-end="url(#arrow-primary)"/>
</g>
<g class="transformation-arrow mechanism-edge">
<path class="transformation-arrow mechanism-edge-path" d="M 157.0 178.0 L 357.0 178.0 L 357.0 178.0 L 557.0 178.0" fill="none" stroke="#2563EB" stroke-width="1.7" marker-end="url(#arrow-primary)"/>
</g>
<g class="transformation-arrow mechanism-edge">
<path class="transformation-arrow mechanism-edge-path" d="M 557.0 178.0 L 726.0 178.0 L 726.0 178.0 L 895.0 178.0" fill="none" stroke="#2563EB" stroke-width="1.7" marker-end="url(#arrow-primary)"/>
</g>
<g class="transformation-arrow mechanism-edge">
<path class="transformation-arrow mechanism-edge-path" d="M 895.0 178.0 L 797.0 178.0 L 797.0 178.0 L 699.0 178.0" fill="none" stroke="#2563EB" stroke-width="1.7" marker-end="url(#arrow-primary)"/>
</g>
<g class="transformation-arrow mechanism-edge">
<path class="transformation-arrow mechanism-edge-path" d="M 699.0 178.0 L 557.0 178.0 L 557.0 266.0 L 415.0 266.0" fill="none" stroke="#2563EB" stroke-width="1.7" marker-end="url(#arrow-primary)"/>
</g>
<g class="bidirectional-color-arrows forward-reverse-lanes" data-label="forward_reverse">
<path class="forward-arrow bidirectional-color-arrows" d="M 150 574 C 380 600, 720 600, 950 574" fill="none" stroke="#2563EB" stroke-width="2.4" marker-end="url(#arrow-forward)"/>
<path class="reverse-arrow bidirectional-color-arrows" d="M 950 590 C 720 612, 380 612, 150 590" fill="none" stroke="#B45309" stroke-width="2.4" marker-end="url(#arrow-reverse)"/>
<text x="260.0" y="568.0" fill="#2563EB" font-size="11" text-anchor="middle" dominant-baseline="middle">前向</text>
<text x="840.0" y="596.0" fill="#B45309" font-size="11" text-anchor="middle" dominant-baseline="middle">反向</text>
</g>
<g class="feedback-lane" data-label="feedback">
<rect x="72.0" y="500.0" width="956.0" height="52.0" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<path class="feedback-lane-path" d="M 160 526 C 360 582, 710 582, 920 526" fill="none" stroke="#B45309" stroke-width="1.5" stroke-dasharray="7 5" marker-end="url(#arrow)"/>
<text x="550.0" y="526.0" fill="#64748B" font-size="11" text-anchor="middle" dominant-baseline="middle">反馈 / 校正通道</text>
</g>
</svg>